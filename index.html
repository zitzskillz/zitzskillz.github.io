<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Für Arnela ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(to bottom right, #ffd6e7, #fff0f5);
      font-family: Arial, sans-serif;
      text-align: center;

      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* ⭐ STAR BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(2px 2px at 20px 30px, white, transparent),
        radial-gradient(2px 2px at 80px 120px, white, transparent),
        radial-gradient(1px 1px at 200px 80px, white, transparent),
        radial-gradient(1px 1px at 300px 200px, white, transparent),
        radial-gradient(2px 2px at 400px 50px, white, transparent),
        radial-gradient(1px 1px at 500px 150px, white, transparent),
        radial-gradient(2px 2px at 600px 250px, white, transparent),
        radial-gradient(1px 1px at 700px 100px, white, transparent);

      background-repeat: repeat;
      background-size: 800px 800px;
      opacity: 0.4;
      animation: starsMove 60s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes starsMove {
      from { transform: translate(0, 0); }
      to { transform: translate(-200px, -200px); }
    }

    /* ⭐ MAIN CARD — removed transform: translateX(-2px) hack */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;

      gap: 14px;

      width: 100%;
      max-width: 600px;

      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: clamp(28px, 6vw, 64px);
      color: #ff2e63;
      animation: fadeIn 2s ease;
    }

    p {
      font-size: clamp(14px, 4vw, 20px);
      color: #444;
      line-height: 1.5;
      animation: fadeIn 3s ease;
    }

    #countdown {
      font-size: clamp(14px, 4vw, 20px);
      color: #ff2e63;
      font-weight: bold;
    }

    /* ⭐ INFINITE SCROLL STRIP */
    .carousel-wrap {
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .carousel-track {
      display: flex;
      gap: 14px;
      width: max-content;
      animation: scrollStrip 40s linear infinite;
    }

    .carousel-wrap:hover .carousel-track {
      animation-play-state: paused;
    }

    .carousel-track img {
      flex-shrink: 0;
      width: min(60vw, 220px);
      height: min(60vw, 220px);
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    @keyframes scrollStrip {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ⭐ HEARTS */
    .heart {
      position: absolute;
      color: rgba(255, 0, 100, 0.6);
      font-size: 18px;
      animation: rise 10s linear infinite;
      z-index: 1;
    }

    @keyframes rise {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-120vh); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ⭐ TEDDY BEAR */
    .teddy-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: float 3s ease-in-out infinite, fadeIn 1s ease;
      cursor: pointer;
      user-select: none;
    }

    .speech-bubble {
      background: white;
      border: 2px solid #ff2e63;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: clamp(11px, 3vw, 14px);
      color: #ff2e63;
      font-weight: bold;
      position: relative;
      margin-bottom: 6px;
      white-space: nowrap;
    }

    .speech-bubble::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 7px 0 7px;
      border-style: solid;
      border-color: white transparent transparent transparent;
      z-index: 1;
    }

    .speech-bubble::before {
      content: "";
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 11px 8px 0 8px;
      border-style: solid;
      border-color: #ff2e63 transparent transparent transparent;
      z-index: 0;
    }

    .teddy {
      font-size: clamp(38px, 8vw, 56px);
      line-height: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .teddy-wrap.playing {
      animation: dance 0.5s ease-in-out infinite alternate;
    }

    @keyframes dance {
      0%   { transform: translateY(0px) rotate(-6deg) scale(1.05); }
      100% { transform: translateY(-6px) rotate(6deg) scale(1.1); }
    }

    .music-hint {
      font-size: 11px;
      color: rgba(255, 46, 99, 0.6);
      margin-top: 4px;
      letter-spacing: 0.03em;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="teddy-wrap" id="teddyWrap" onclick="toggleMusic()">
      <div class="speech-bubble" id="bubble">Ich liebe dich maco 🥰</div>
      <div class="teddy">🧸</div>
      <div class="music-hint" id="musicHint">▶ tap me for a surprise</div>
    </div>

    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg">
    </audio>

    <h1>Volim te bebo zauvijek ❤️</h1>

    <p>
      Svaki trenutak s tobom je poseban maco.<br>
      Diese Seite ist eine kleine Erinnerung koliko mi značiš, na moj fazon haha.
    </p>

    <div id="countdown"></div>

    <div class="carousel-wrap">
      <div class="carousel-track" id="track">
        <img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg"><img src="photo4.jpg">
        <img src="photo5.jpg"><img src="photo6.jpg"><img src="photo7.jpg"><img src="photo8.jpg">
        <img src="photo9.jpg"><img src="photo10.jpg"><img src="photo11.jpg"><img src="photo12.jpg">
        <img src="photo13.jpg"><img src="photo14.jpg"><img src="photo15.jpg"><img src="photo16.jpg">
        <img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg"><img src="photo4.jpg">
        <img src="photo5.jpg"><img src="photo6.jpg"><img src="photo7.jpg"><img src="photo8.jpg">
        <img src="photo9.jpg"><img src="photo10.jpg"><img src="photo11.jpg"><img src="photo12.jpg">
        <img src="photo13.jpg"><img src="photo14.jpg"><img src="photo15.jpg"><img src="photo16.jpg">
      </div>
    </div>

  </div>

  <!-- HEARTS -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
  <div class="heart" style="left:20%; animation-delay:2s;">💖</div>
  <div class="heart" style="left:35%; animation-delay:4s;">❤️</div>
  <div class="heart" style="left:50%; animation-delay:1s;">💕</div>
  <div class="heart" style="left:65%; animation-delay:5s;">❤️</div>
  <div class="heart" style="left:80%; animation-delay:3s;">💗</div>

  <!-- COUNTDOWN -->
  <script>
    const startDate = new Date("2025-11-01");

    function updateCountdown() {
      const now = new Date();
      const diff = now - startDate;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);

      document.getElementById("countdown").innerHTML =
        `Zajedno smo već ${days} dana, ${hours} sati i ${minutes} minuta ❤️`;
    }

    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>


  <!-- MUSIC -->
  <script>
    const music = document.getElementById("bgMusic");
    const wrap  = document.getElementById("teddyWrap");
    const hint  = document.getElementById("musicHint");
    const bubble = document.getElementById("bubble");
    music.volume = 0.25;
    let playing = false;

    function toggleMusic() {
      if (!playing) {
        music.play().then(() => {
          playing = true;
          wrap.classList.add("playing");
          hint.textContent = "⏸ tap to pause";
          bubble.textContent = "🎵 Time To Dance 🎵";
        }).catch(() => {
          hint.textContent = "⚠️ add music.mp3 next to this file";
        });
      } else {
        music.pause();
        playing = false;
        wrap.classList.remove("playing");
        hint.textContent = "▶ tap me for a surprise";
        bubble.textContent = "Ich liebe dich maco 🥰";
      }
    }
  </script>

</body>
</html>
