<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Für Arnela ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(to bottom right, #ffd6e7, #fff0f5);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 64px;
      color: #ff2e63;
      margin-bottom: 10px;
      animation: fadeIn 2s ease;
    }

    p {
      font-size: 24px;
      color: #444;
      max-width: 700px;
      padding: 0 20px;
      animation: fadeIn 3s ease;
    }

    img {
      width: 280px;
      margin-top: 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: float 4s ease-in-out infinite;
    }

    .heart {
      position: absolute;
      color: rgba(255, 0, 100, 0.6);
      font-size: 24px;
      animation: rise 10s linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      to {
        transform: translateY(-120vh) scale(1.5);
        opacity: 0;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <h1>Volim te bebo zauvijek ❤️</h1>

  <p>
    Every moment with you feels special.<br>
    This little website is just a reminder that you mean the world to me.
  </p>

  <img src="photo.jpg" alt="Us together">

  <!-- Floating Hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
  <div class="heart" style="left:20%; animation-delay:2s;">💖</div>
  <div class="heart" style="left:35%; animation-delay:4s;">❤️</div>
  <div class="heart" style="left:50%; animation-delay:1s;">💕</div>
  <div class="heart" style="left:65%; animation-delay:5s;">❤️</div>
  <div class="heart" style="left:80%; animation-delay:3s;">💗</div>

</body>
</html>
